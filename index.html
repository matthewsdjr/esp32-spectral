<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Análisis Espectral</title>
<link href="https://fonts.googleapis.com/css2?family=Space+Mono:wght@400;700&family=DM+Sans:wght@300;400;500;600&display=swap" rel="stylesheet">
<style>
  :root {
    --bg:       #070b14;
    --surface:  #0d1526;
    --surface2: #131e33;
    --border:   rgba(99,179,237,0.12);
    --accent:   #38bdf8;
    --accent2:  #6366f1;
    --success:  #22d3a0;
    --danger:   #f87171;
    --warn:     #fbbf24;
    --text:     #e2e8f0;
    --muted:    #4a6080;
    --mono:     'Space Mono', monospace;
    --sans:     'DM Sans', sans-serif;
  }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { font-family: var(--sans); background: var(--bg); color: var(--text); min-height: 100vh; }

  /* Layout principal */
  .app { display: grid; grid-template-columns: 260px 1fr; grid-template-rows: auto 1fr; min-height: 100vh; }

  /* Header */
  header {
    grid-column: 1/-1;
    padding: 18px 28px;
    border-bottom: 1px solid var(--border);
    display: flex; align-items: center; justify-content: space-between;
    background: var(--surface);
  }
  .brand { display: flex; align-items: baseline; gap: 12px; }
  .brand h1 { font-family: var(--mono); font-size: 1.15rem; font-weight: 700; color: var(--accent); letter-spacing: -0.02em; }
  .brand span { font-size: 0.72rem; color: var(--muted); letter-spacing: 0.1em; text-transform: uppercase; }
  .header-right { display: flex; align-items: center; gap: 12px; }
  .status-pill {
    display: flex; align-items: center; gap: 7px;
    background: var(--surface2); border: 1px solid var(--border);
    border-radius: 20px; padding: 5px 14px; font-size: 0.78rem; color: var(--muted);
  }
  .dot { width: 7px; height: 7px; border-radius: 50%; background: var(--muted); transition: all 0.3s; }
  .dot.connected  { background: var(--success); box-shadow: 0 0 6px var(--success); }
  .dot.connecting { background: var(--warn); animation: blink 1s infinite; }
  @keyframes blink { 0%,100%{opacity:1} 50%{opacity:0.3} }

  /* Log flotante — esquina derecha */
  .log-panel {
    position: fixed; bottom: 20px; right: 20px; width: 300px;
    background: var(--surface); border: 1px solid var(--border);
    border-radius: 12px; z-index: 100; overflow: hidden;
    box-shadow: 0 8px 32px rgba(0,0,0,0.4);
  }
  .log-header {
    display: flex; align-items: center; justify-content: space-between;
    padding: 8px 14px; border-bottom: 1px solid var(--border);
    font-family: var(--mono); font-size: 0.7rem; color: var(--muted);
    cursor: pointer; user-select: none;
  }
  .log-header:hover { background: var(--surface2); }
  .log-toggle { background: none; border: none; color: var(--muted); cursor: pointer; font-size: 0.8rem; }
  #log {
    font-family: var(--mono); font-size: 0.68rem; color: var(--muted);
    height: 140px; overflow-y: auto; padding: 10px 14px;
    white-space: pre-wrap; word-break: break-all;
    transition: height 0.25s;
  }
  #log.collapsed { height: 0; padding: 0 14px; }
  .log-ok   { color: var(--success); }
  .log-err  { color: var(--danger); }
  .log-info { color: var(--accent); }
  .log-warn { color: var(--warn); }

  /* Sidebar */
  .sidebar {
    background: var(--surface);
    border-right: 1px solid var(--border);
    padding: 24px 18px;
    display: flex; flex-direction: column; gap: 10px;
  }
  .section-label {
    font-size: 0.65rem; font-weight: 600; color: var(--muted);
    text-transform: uppercase; letter-spacing: 0.12em;
    margin: 8px 0 4px; padding-left: 4px;
  }
  .btn {
    width: 100%; padding: 11px 16px;
    border-radius: 8px; border: 1px solid var(--border);
    font-family: var(--sans); font-size: 0.88rem; font-weight: 500;
    cursor: pointer; transition: all 0.18s;
    display: flex; align-items: center; gap: 9px;
    background: var(--surface2); color: var(--text);
  }
  .btn:disabled { opacity: 0.35; cursor: not-allowed; }
  .btn:not(:disabled):hover { border-color: var(--accent); color: var(--accent); }
  .btn-primary { background: var(--accent2); border-color: var(--accent2); color: #fff; }
  .btn-primary:not(:disabled):hover { background: #7c7ff5; border-color: #7c7ff5; color: #fff; }
  .btn-connect { background: rgba(56,189,248,0.1); border-color: rgba(56,189,248,0.3); color: var(--accent); }
  .btn-connect:not(:disabled):hover { background: rgba(56,189,248,0.2); }
  .btn-success { background: rgba(34,211,160,0.1); border-color: rgba(34,211,160,0.3); color: var(--success); }
  .btn-success:not(:disabled):hover { background: rgba(34,211,160,0.2); }
  .btn-danger  { background: rgba(248,113,113,0.1); border-color: rgba(248,113,113,0.3); color: var(--danger); }
  .btn-danger:not(:disabled):hover  { background: rgba(248,113,113,0.2); }
  .btn .icon { font-size: 14px; width: 16px; text-align: center; }

  /* Stats */
  .stats-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 8px; margin-top: 4px; }
  .stat-card { background: var(--surface2); border: 1px solid var(--border); border-radius: 8px; padding: 10px 12px; }
  .stat-lbl { font-size: 0.62rem; color: var(--muted); text-transform: uppercase; letter-spacing: 0.08em; }
  .stat-val { font-family: var(--mono); font-size: 1rem; color: var(--accent); margin-top: 3px; }

  /* Contador de sesión */
  .session-badge {
    background: var(--surface2); border: 1px solid var(--border);
    border-radius: 8px; padding: 10px 12px; margin-top: 4px;
    display: flex; align-items: center; justify-content: space-between;
  }
  .session-badge span { font-size: 0.75rem; color: var(--muted); }
  .session-badge strong { font-family: var(--mono); font-size: 1rem; color: var(--accent2); }

  /* Main content */
  .main { padding: 24px 28px; overflow-y: auto; }

  /* Tabs */
  .tabs { display: flex; gap: 4px; margin-bottom: 20px; border-bottom: 1px solid var(--border); padding-bottom: 0; }
  .tab {
    padding: 8px 20px; border: none; background: none;
    font-family: var(--sans); font-size: 0.88rem; color: var(--muted);
    cursor: pointer; border-bottom: 2px solid transparent;
    margin-bottom: -1px; transition: all 0.18s;
  }
  .tab:hover { color: var(--text); }
  .tab.active { color: var(--accent); border-bottom-color: var(--accent); }

  /* Gráfica */
  .chart-card {
    background: var(--surface); border: 1px solid var(--border);
    border-radius: 12px; padding: 20px;
  }
  .chart-header { display: flex; align-items: center; justify-content: space-between; margin-bottom: 16px; }
  .chart-title { font-family: var(--mono); font-size: 0.8rem; color: var(--muted); }
  .chart-wrap { position: relative; width: 100%; height: 300px; }

  /* Grid canales */
  .ch-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(110px, 1fr)); gap: 10px; }
  .ch-card {
    background: var(--surface); border: 1px solid var(--border);
    border-radius: 10px; padding: 12px 10px; text-align: center;
    transition: border-color 0.25s;
  }
  .ch-card.active { border-color: rgba(99,102,241,0.5); background: rgba(99,102,241,0.06); }
  .ch-id  { font-family: var(--mono); font-size: 1rem; font-weight: 700; color: var(--accent); }
  .ch-nm  { font-size: 0.68rem; color: var(--muted); margin: 3px 0; }
  .ch-val { font-family: var(--mono); font-size: 0.8rem; color: var(--text); }

  /* Historial de mediciones */
  .history-list { display: flex; flex-direction: column; gap: 8px; }
  .history-item {
    background: var(--surface); border: 1px solid var(--border);
    border-radius: 10px; padding: 12px 16px;
    display: flex; align-items: center; justify-content: space-between;
  }
  .history-item:hover { border-color: rgba(56,189,248,0.25); }
  .history-meta { display: flex; flex-direction: column; gap: 3px; }
  .history-num  { font-family: var(--mono); font-size: 0.78rem; color: var(--accent2); }
  .history-time { font-size: 0.72rem; color: var(--muted); }
  .history-peak { font-size: 0.78rem; color: var(--text); }
  .btn-dl-small {
    padding: 5px 12px; border-radius: 6px; border: 1px solid var(--border);
    background: var(--surface2); color: var(--success); font-size: 0.75rem;
    cursor: pointer; font-family: var(--sans); transition: all 0.15s;
  }
  .btn-dl-small:hover { border-color: var(--success); background: rgba(34,211,160,0.1); }

  .empty-state { text-align: center; padding: 48px 24px; color: var(--muted); font-size: 0.88rem; }
  .empty-icon  { font-size: 2rem; margin-bottom: 10px; opacity: 0.4; }

  /* Responsive mobile */
  @media (max-width: 680px) {
    .app { grid-template-columns: 1fr; }
    .sidebar { border-right: none; border-bottom: 1px solid var(--border); padding: 16px; }
    .stats-grid { grid-template-columns: 1fr 1fr; }
    .log-panel { width: calc(100vw - 24px); right: 12px; bottom: 12px; }
    .main { padding: 16px; }
  }
</style>
</head>
<body>
<div class="app">

  <!-- HEADER -->
  <header>
    <div class="brand">
      <h1>Análisis Espectral</h1>
      <span>AS7265x · 410–940 nm · 18 canales</span>
    </div>
    <div class="header-right">
      <div class="status-pill">
        <div class="dot" id="dot"></div>
        <span id="status-text">Desconectado</span>
      </div>
    </div>
  </header>

  <!-- SIDEBAR -->
  <aside class="sidebar">

    <div class="section-label">Sensor</div>
    <button class="btn btn-connect" id="btn-connect" onclick="toggleConnect()">
      <span class="icon">⬡</span> Conectar Sensor
    </button>
    <button class="btn btn-primary" id="btn-measure" onclick="sendCmd('a')" disabled>
      <span class="icon">◈</span> Analizar
    </button>

    <div class="section-label" style="margin-top:12px">Última medición</div>
    <div class="stats-grid" id="stats-grid">
      <div class="stat-card"><div class="stat-lbl">Pico</div><div class="stat-val" id="stat-peak">—</div></div>
      <div class="stat-card"><div class="stat-lbl">Máximo</div><div class="stat-val" id="stat-max">—</div></div>
    </div>

    <div class="session-badge">
      <span>Mediciones hoy</span>
      <strong id="stat-count">0</strong>
    </div>

    <div class="section-label" style="margin-top:12px">Descarga de datos</div>
    <button class="btn btn-success" id="btn-dl-last" onclick="downloadLast()" disabled>
      <span class="icon">↓</span> Última medición (.csv)
    </button>
    <button class="btn btn-success" id="btn-dl-all" onclick="downloadAll()" disabled>
      <span class="icon">↓</span> Todas las mediciones (.zip)
    </button>
    <button class="btn btn-danger" id="btn-clear-all" onclick="confirmClear()" disabled>
      <span class="icon">✕</span> Eliminar todos los datos
    </button>

  </aside>

  <!-- MAIN -->
  <main class="main">

    <div class="tabs">
      <button class="tab active" id="tab-chart"   onclick="switchTab('chart')">Gráfica</button>
      <button class="tab"        id="tab-channels" onclick="switchTab('channels')">Canales</button>
      <button class="tab"        id="tab-history"  onclick="switchTab('history')">Historial</button>
    </div>

    <!-- Vista: Gráfica -->
    <div id="view-chart">
      <div class="chart-card">
        <div class="chart-header">
          <span class="chart-title">ESPECTRO RADIOMÉTRICO</span>
          <span class="chart-title" id="chart-timestamp">—</span>
        </div>
        <div class="chart-wrap"><canvas id="spectralChart"></canvas></div>
      </div>
    </div>

    <!-- Vista: Canales -->
    <div id="view-channels" style="display:none">
      <div class="ch-grid" id="channel-grid"></div>
    </div>

    <!-- Vista: Historial -->
    <div id="view-history" style="display:none">
      <div class="history-list" id="history-list">
        <div class="empty-state">
          <div class="empty-icon">◈</div>
          Aún no hay mediciones en esta sesión.<br>Presiona <strong>Analizar</strong> para comenzar.
        </div>
      </div>
    </div>

  </main>
</div>

<!-- LOG FLOTANTE -->
<div class="log-panel">
  <div class="log-header" onclick="toggleLog()">
    <span>◉ LOG BLE</span>
    <button class="log-toggle" id="log-toggle-btn">▾</button>
  </div>
  <div id="log"></div>
</div>

<script src="https://cdnjs.cloudflare.com/ajax/libs/Chart.js/4.4.1/chart.umd.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/jszip/3.10.1/jszip.min.js"></script>
<script>
const CHANNELS = [
  {id:'A',nm:410},{id:'B',nm:435},{id:'C',nm:460},
  {id:'D',nm:485},{id:'E',nm:510},{id:'F',nm:535},
  {id:'G',nm:560},{id:'H',nm:585},{id:'R',nm:610},
  {id:'I',nm:645},{id:'S',nm:680},{id:'J',nm:705},
  {id:'T',nm:730},{id:'U',nm:760},{id:'V',nm:810},
  {id:'W',nm:860},{id:'K',nm:900},{id:'L',nm:940},
];

// --- Grid canales ---
const gridEl = document.getElementById('channel-grid');
CHANNELS.forEach(ch => {
  gridEl.innerHTML += `
    <div class="ch-card" id="card-${ch.id}">
      <div class="ch-id">${ch.id}</div>
      <div class="ch-nm">${ch.nm} nm</div>
      <div class="ch-val" id="val-${ch.id}">—</div>
    </div>`;
});

// --- Colores espectrales ---
function nmToColor(nm, alpha) {
  let r=0,g=0,b=0;
  if      (nm>=380&&nm<440){r=(440-nm)/60;g=0;b=1;}
  else if (nm>=440&&nm<490){r=0;g=(nm-440)/50;b=1;}
  else if (nm>=490&&nm<510){r=0;g=1;b=(510-nm)/20;}
  else if (nm>=510&&nm<580){r=(nm-510)/70;g=1;b=0;}
  else if (nm>=580&&nm<645){r=1;g=(645-nm)/65;b=0;}
  else if (nm>=645&&nm<=780){r=1;g=0;b=0;}
  else if (nm>780)         {r=0.55;g=0.05;b=0.15;}
  else                     {r=0.35;g=0;b=0.55;}
  const f = (nm<380||nm>780)?0.55:1.0;
  return `rgba(${Math.round(r*255*f)},${Math.round(g*255*f)},${Math.round(b*255*f)},${alpha})`;
}

// --- Chart.js ---
const spectralChart = new Chart(document.getElementById('spectralChart'), {
  type: 'bar',
  data: {
    labels: CHANNELS.map(c => c.nm+''),
    datasets: [{
      label: 'nW/cm²',
      data: new Array(18).fill(0),
      backgroundColor: CHANNELS.map(c => nmToColor(c.nm, 0.75)),
      borderColor:     CHANNELS.map(c => nmToColor(c.nm, 1.0)),
      borderWidth: 1.5,
      borderRadius: 4,
    }]
  },
  options: {
    responsive: true,
    maintainAspectRatio: false,
    plugins: {
      legend: { display: false },
      tooltip: {
        backgroundColor: '#0d1526',
        borderColor: 'rgba(99,179,237,0.2)',
        borderWidth: 1,
        titleColor: '#38bdf8',
        bodyColor: '#94a3b8',
        titleFont: { family: 'Space Mono', size: 11 },
        callbacks: {
          title: items => 'Canal '+CHANNELS[items[0].dataIndex].id+' · '+items[0].label+' nm',
          label: item  => ' '+item.parsed.y.toFixed(4)+' nW/cm²'
        }
      }
    },
    scales: {
      x: {
        ticks: { color:'#4a6080', font:{size:9}, maxRotation:45, autoSkip:false },
        grid:  { color:'rgba(255,255,255,0.03)' },
        title: { display:true, text:'Longitud de onda (nm)', color:'#4a6080', font:{size:11} }
      },
      y: {
        ticks: { color:'#4a6080', font:{size:10}, callback: v => v.toFixed(1) },
        grid:  { color:'rgba(255,255,255,0.05)' },
        title: { display:true, text:'nW/cm²', color:'#4a6080', font:{size:11} }
      }
    }
  }
});

// --- Estado ---
const SERVICE_UUID = '6e400001-b5a3-f393-e0a9-e50e24dcca9e';
const TX_UUID      = '6e400003-b5a3-f393-e0a9-e50e24dcca9e';
const RX_UUID      = '6e400002-b5a3-f393-e0a9-e50e24dcca9e';

let device, rxChar, buffer='', receiving=false;
let measurements = [];   // [{id, timestamp, csv, values, peak, max}]
let logCollapsed = false;

// --- Log ---
function log(msg, type='') {
  const el = document.getElementById('log');
  const cls = type ? 'log-'+type : '';
  const t = new Date().toLocaleTimeString();
  el.innerHTML += `<span class="${cls}">[${t}] ${msg}\n</span>`;
  el.scrollTop = el.scrollHeight;
}

function toggleLog() {
  logCollapsed = !logCollapsed;
  document.getElementById('log').classList.toggle('collapsed', logCollapsed);
  document.getElementById('log-toggle-btn').textContent = logCollapsed ? '▸' : '▾';
}

// --- Status ---
function setStatus(text, state) {
  document.getElementById('status-text').textContent = text;
  document.getElementById('dot').className = 'dot'+(state?' '+state:'');
}

// --- Tabs ---
function switchTab(tab) {
  ['chart','channels','history'].forEach(t => {
    document.getElementById('tab-'+t).classList.toggle('active', t===tab);
    const v = t==='chart' ? 'view-chart' : (t==='channels' ? 'view-channels' : 'view-history');
    document.getElementById(v).style.display = (t===tab) ? 'block' : 'none';
  });
}

// --- BLE ---
async function toggleConnect() {
  if (device && device.gatt.connected) { device.gatt.disconnect(); return; }
  try {
    setStatus('Buscando...','connecting');
    log('Iniciando escaneo BLE...','info');
    device = await navigator.bluetooth.requestDevice({
      filters: [{name:'ESP32-C3 Spectral'}],
      optionalServices: [SERVICE_UUID]
    });
    device.addEventListener('gattserverdisconnected', onDisconnect);
    const server  = await device.gatt.connect();
    const service = await server.getPrimaryService(SERVICE_UUID);
    const txChar  = await service.getCharacteristic(TX_UUID);
    await txChar.startNotifications();
    txChar.addEventListener('characteristicvaluechanged', onData);
    rxChar = await service.getCharacteristic(RX_UUID);
    setStatus('Conectado · ESP32-C3 Spectral','connected');
    log('Conexión establecida ✓','ok');
    document.getElementById('btn-connect').innerHTML = '<span class="icon">⬡</span> Desconectar';
    document.getElementById('btn-measure').disabled = false;
  } catch(e) {
    setStatus('Desconectado','');
    log('Error: '+e.message,'err');
  }
}

function onDisconnect() {
  setStatus('Desconectado','');
  log('Dispositivo desconectado.','warn');
  document.getElementById('btn-connect').innerHTML = '<span class="icon">⬡</span> Conectar Sensor';
  document.getElementById('btn-measure').disabled = true;
  buffer=''; receiving=false;
}

function onData(event) {
  buffer += new TextDecoder().decode(event.target.value);
  if (buffer.includes('<<CSV_START>>')) {
    receiving = true;
    buffer = buffer.substring(buffer.indexOf('<<CSV_START>>')+13);
    log('Recibiendo datos...','info');
  }
  if (receiving && buffer.includes('<<CSV_END>>')) {
    processCSV(buffer.substring(0, buffer.indexOf('<<CSV_END>>')).trim());
    buffer=''; receiving=false;
    return;
  }
  if (!receiving) {
    const valid = buffer.split('\n').filter(l => /^[A-Z],\d+,/.test(l));
    if (valid.length >= 18) {
      processCSV('Canal,Lambda_nm,Valor_nW_cm2\n'+valid.join('\n'));
      buffer='';
    }
  }
}

async function sendCmd(cmd) {
  if (!rxChar) { log('No conectado','err'); return; }
  try {
    await rxChar.writeValueWithoutResponse(new TextEncoder().encode(cmd+'\n'));
    log("Cmd: '"+cmd+"'",'info');
  } catch(e) { log('Error: '+e.message,'err'); }
}

// --- Procesar CSV ---
function processCSV(csvText) {
  const now = new Date();
  const ts  = now.toLocaleString('es', {hour:'2-digit',minute:'2-digit',second:'2-digit'});
  const values = new Array(18).fill(0);

  csvText.split('\n').forEach(line => {
    const p = line.split(',');
    if (p.length===3 && /^[A-Z]$/.test(p[0].trim())) {
      const id=p[0].trim(), val=parseFloat(p[2]);
      const idx=CHANNELS.findIndex(c=>c.id===id);
      if (idx>=0 && !isNaN(val)) {
        values[idx]=val;
        const el=document.getElementById('val-'+id);
        const card=document.getElementById('card-'+id);
        if(el)   el.textContent=val.toFixed(4);
        if(card) card.classList.add('active');
      }
    }
  });

  const maxVal  = Math.max(...values);
  const peakIdx = values.indexOf(maxVal);
  const peakNm  = CHANNELS[peakIdx].nm;

  const entry = {
    id: measurements.length+1,
    timestamp: now,
    timeStr: ts,
    csv: csvText,
    values,
    peak: peakNm,
    max: maxVal
  };
  measurements.push(entry);

  // Actualizar gráfica
  spectralChart.data.datasets[0].data = values;
  spectralChart.update();
  document.getElementById('chart-timestamp').textContent = ts;

  // Stats sidebar
  document.getElementById('stat-peak').textContent  = peakNm+' nm';
  document.getElementById('stat-max').textContent   = maxVal.toFixed(2);
  document.getElementById('stat-count').textContent = measurements.length;

  // Actualizar historial
  renderHistory();

  // Habilitar botones de descarga
  document.getElementById('btn-dl-last').disabled  = false;
  document.getElementById('btn-dl-all').disabled   = false;
  document.getElementById('btn-clear-all').disabled= false;

  log('Medición #'+entry.id+' · pico '+peakNm+' nm · max '+maxVal.toFixed(2),'ok');
}

// --- Historial ---
function renderHistory() {
  const el = document.getElementById('history-list');
  if (measurements.length === 0) {
    el.innerHTML = `<div class="empty-state"><div class="empty-icon">◈</div>Aún no hay mediciones en esta sesión.<br>Presiona <strong>Analizar</strong> para comenzar.</div>`;
    return;
  }
  el.innerHTML = [...measurements].reverse().map(m => `
    <div class="history-item">
      <div class="history-meta">
        <span class="history-num">Medición #${m.id}</span>
        <span class="history-time">${m.timeStr}</span>
        <span class="history-peak">Pico: ${m.peak} nm · Máx: ${m.max.toFixed(2)} nW/cm²</span>
      </div>
      <button class="btn-dl-small" onclick="downloadSingle(${m.id})">↓ CSV</button>
    </div>
  `).join('');
}

// --- Descargas ---
function fmtDate() {
  const d=new Date();
  return d.getFullYear()+'-'+String(d.getMonth()+1).padStart(2,'0')+'-'+String(d.getDate()).padStart(2,'0');
}

function downloadSingle(id) {
  const m = measurements.find(x=>x.id===id);
  if (!m) return;
  const blob = new Blob([m.csv],{type:'text/csv'});
  const url  = URL.createObjectURL(blob);
  const a    = document.createElement('a');
  a.href=url;
  a.download=`espectral_${fmtDate()}_medicion${String(id).padStart(3,'0')}.csv`;
  a.click();
  URL.revokeObjectURL(url);
  log('Descargando medición #'+id,'ok');
}

function downloadLast() {
  if (!measurements.length) return;
  downloadSingle(measurements[measurements.length-1].id);
}

async function downloadAll() {
  if (!measurements.length) return;
  try {
    const zip = new JSZip();
    const folder = zip.folder('espectral_'+fmtDate());
    measurements.forEach(m => {
      folder.file(`medicion_${String(m.id).padStart(3,'0')}_${m.timeStr.replace(/:/g,'-')}.csv`, m.csv);
    });
    // Agregar resumen
    const summary = 'id,hora,pico_nm,maximo_nW_cm2\n' +
      measurements.map(m=>`${m.id},${m.timeStr},${m.peak},${m.max.toFixed(4)}`).join('\n');
    folder.file('resumen.csv', summary);

    const blob = await zip.generateAsync({type:'blob'});
    const url  = URL.createObjectURL(blob);
    const a    = document.createElement('a');
    a.href=url;
    a.download=`espectral_${fmtDate()}_todas.zip`;
    a.click();
    URL.revokeObjectURL(url);
    log('ZIP con '+measurements.length+' mediciones descargado','ok');
  } catch(e) {
    log('Error al generar ZIP: '+e.message,'err');
  }
}

function confirmClear() {
  if (!measurements.length) return;
  const ok = confirm(`¿Eliminar ${measurements.length} medición(es)?\nEsta acción no se puede deshacer.`);
  if (!ok) return;
  measurements = [];
  renderHistory();
  document.getElementById('stat-count').textContent = '0';
  document.getElementById('stat-peak').textContent  = '—';
  document.getElementById('stat-max').textContent   = '—';
  document.getElementById('chart-timestamp').textContent = '—';
  spectralChart.data.datasets[0].data = new Array(18).fill(0);
  spectralChart.update();
  CHANNELS.forEach(ch => {
    const el=document.getElementById('val-'+ch.id);
    const card=document.getElementById('card-'+ch.id);
    if(el)   el.textContent='—';
    if(card) card.classList.remove('active');
  });
  document.getElementById('btn-dl-last').disabled   = true;
  document.getElementById('btn-dl-all').disabled    = true;
  document.getElementById('btn-clear-all').disabled = true;
  log('Todos los datos eliminados.','warn');
}

if (!navigator.bluetooth) {
  log('Web Bluetooth no disponible.','err');
  log('Usa Chrome (Android) o WebBLE (iOS).','warn');
  document.getElementById('btn-connect').disabled = true;
}
</script>
