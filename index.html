<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>ESP32 Spectral BLE</title>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body {
    font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
    background: #0f172a;
    color: #e2e8f0;
    min-height: 100vh;
    padding: 20px;
  }
  h1 { font-size: 1.4rem; color: #38bdf8; margin-bottom: 4px; }
  .subtitle { font-size: 0.8rem; color: #64748b; margin-bottom: 20px; }

  .status-bar {
    display: flex; align-items: center; gap: 10px;
    background: #1e293b; border-radius: 10px;
    padding: 12px 16px; margin-bottom: 16px;
  }
  .dot { width: 10px; height: 10px; border-radius: 50%; background: #334155; transition: background 0.3s; }
  .dot.connected  { background: #22c55e; box-shadow: 0 0 8px #22c55e; }
  .dot.connecting { background: #f59e0b; animation: pulse 1s infinite; }
  @keyframes pulse { 0%,100%{opacity:1} 50%{opacity:0.4} }
  #status-text { font-size: 0.9rem; color: #94a3b8; }

  .btn {
    width: 100%; padding: 14px; border-radius: 12px; border: none;
    font-size: 1rem; font-weight: 600; cursor: pointer;
    margin-bottom: 10px; transition: all 0.2s;
  }
  .btn:disabled { opacity: 0.4; cursor: not-allowed; }
  .btn-connect  { background: #0ea5e9; color: #fff; }
  .btn-measure  { background: #6366f1; color: #fff; }
  .btn-download { background: #22c55e; color: #fff; }
  .btn-clear    { background: #334155; color: #94a3b8; }

  .section-title {
    font-size: 0.75rem; font-weight: 700; color: #475569;
    text-transform: uppercase; letter-spacing: 0.08em;
    margin: 20px 0 10px;
  }

  .tabs { display: flex; gap: 8px; margin-bottom: 14px; }
  .tab {
    flex: 1; padding: 8px; border-radius: 8px; border: none;
    font-size: 0.85rem; font-weight: 600; cursor: pointer;
    background: #1e293b; color: #64748b; transition: all 0.2s;
  }
  .tab.active { background: #6366f1; color: #fff; }

  .chart-container {
    background: #1e293b; border-radius: 12px; padding: 16px;
    margin-bottom: 16px;
  }
  .chart-wrap { position: relative; width: 100%; height: 260px; }

  .spectral-grid {
    display: grid; grid-template-columns: repeat(3, 1fr);
    gap: 8px; margin-bottom: 16px;
  }
  .channel-card {
    background: #1e293b; border-radius: 10px; padding: 10px;
    text-align: center; border: 1px solid #334155; transition: border-color 0.3s;
  }
  .channel-card.active { border-color: #6366f1; }
  .ch-label { font-size: 1.1rem; font-weight: 700; color: #38bdf8; }
  .ch-nm    { font-size: 0.7rem; color: #64748b; margin: 2px 0; }
  .ch-val   { font-size: 0.85rem; color: #e2e8f0; font-variant-numeric: tabular-nums; }

  .stats-row { display: grid; grid-template-columns: repeat(3, 1fr); gap: 8px; margin-bottom: 14px; }
  .stat-card { background: #1e293b; border-radius: 10px; padding: 10px 8px; text-align: center; }
  .stat-label { font-size: 0.65rem; color: #64748b; text-transform: uppercase; letter-spacing: 0.06em; }
  .stat-value { font-size: 1.1rem; font-weight: 700; color: #38bdf8; margin-top: 2px; }

  #log {
    background: #0f172a; border: 1px solid #1e293b; border-radius: 10px; padding: 12px;
    font-family: 'Courier New', monospace; font-size: 0.75rem;
    color: #94a3b8; height: 140px; overflow-y: auto;
    white-space: pre-wrap; word-break: break-all;
  }
  .log-ok   { color: #22c55e; }
  .log-err  { color: #f87171; }
  .log-info { color: #38bdf8; }
  .log-warn { color: #f59e0b; }
</style>
</head>
<body>

<h1>📡 ESP32 Spectral</h1>
<p class="subtitle">AS7265x · 18 canales · 410–940 nm</p>

<div class="status-bar">
  <div class="dot" id="dot"></div>
  <span id="status-text">Desconectado</span>
</div>

<button class="btn btn-connect"  id="btn-connect"  onclick="toggleConnect()">Conectar por BLE</button>
<button class="btn btn-measure"  id="btn-measure"  onclick="sendCmd('a')" disabled>Medir y recibir CSV</button>
<button class="btn btn-download" id="btn-download" onclick="downloadCSV()" disabled>Descargar último CSV</button>

<div class="stats-row" id="stats-row" style="display:none">
  <div class="stat-card"><div class="stat-label">Pico (nm)</div><div class="stat-value" id="stat-peak">—</div></div>
  <div class="stat-card"><div class="stat-label">Máximo</div><div class="stat-value" id="stat-max">—</div></div>
  <div class="stat-card"><div class="stat-label">Medición #</div><div class="stat-value" id="stat-count">0</div></div>
</div>

<div class="tabs">
  <button class="tab active" id="tab-chart" onclick="switchTab('chart')">Gráfica</button>
  <button class="tab"        id="tab-grid"  onclick="switchTab('grid')">Canales</button>
  <button class="tab"        id="tab-log"   onclick="switchTab('log')">Log</button>
</div>

<div id="view-chart">
  <div class="chart-container">
    <div class="chart-wrap"><canvas id="spectralChart"></canvas></div>
  </div>
</div>

<div id="view-grid" style="display:none">
  <div class="spectral-grid" id="channel-grid"></div>
</div>

<div id="view-log" style="display:none">
  <div id="log"></div>
  <button class="btn btn-clear" style="margin-top:10px" onclick="clearLog()">Limpiar log</button>
</div>

<script src="https://cdnjs.cloudflare.com/ajax/libs/Chart.js/4.4.1/chart.umd.js"></script>
<script>
const CHANNELS = [
  {id:'A',nm:410},{id:'B',nm:435},{id:'C',nm:460},
  {id:'D',nm:485},{id:'E',nm:510},{id:'F',nm:535},
  {id:'G',nm:560},{id:'H',nm:585},{id:'R',nm:610},
  {id:'I',nm:645},{id:'S',nm:680},{id:'J',nm:705},
  {id:'T',nm:730},{id:'U',nm:760},{id:'V',nm:810},
  {id:'W',nm:860},{id:'K',nm:900},{id:'L',nm:940},
];

const gridEl = document.getElementById('channel-grid');
CHANNELS.forEach(ch => {
  gridEl.innerHTML += `
    <div class="channel-card" id="card-${ch.id}">
      <div class="ch-label">${ch.id}</div>
      <div class="ch-nm">${ch.nm} nm</div>
      <div class="ch-val" id="val-${ch.id}">—</div>
    </div>`;
});

function nmToColor(nm, alpha) {
  let r=0,g=0,b=0;
  if      (nm>=380&&nm<440){r=(440-nm)/60;g=0;b=1;}
  else if (nm>=440&&nm<490){r=0;g=(nm-440)/50;b=1;}
  else if (nm>=490&&nm<510){r=0;g=1;b=(510-nm)/20;}
  else if (nm>=510&&nm<580){r=(nm-510)/70;g=1;b=0;}
  else if (nm>=580&&nm<645){r=1;g=(645-nm)/65;b=0;}
  else if (nm>=645&&nm<=780){r=1;g=0;b=0;}
  else if (nm>780)         {r=0.55;g=0.05;b=0.15;}
  else                     {r=0.35;g=0;b=0.55;}
  const f = (nm<380||nm>780)?0.55:1.0;
  return `rgba(${Math.round(r*255*f)},${Math.round(g*255*f)},${Math.round(b*255*f)},${alpha})`;
}

const bgColors  = CHANNELS.map(c => nmToColor(c.nm, 0.75));
const brdColors = CHANNELS.map(c => nmToColor(c.nm, 1.0));

const spectralChart = new Chart(document.getElementById('spectralChart'), {
  type: 'bar',
  data: {
    labels: CHANNELS.map(c => c.nm + ' nm'),
    datasets: [{
      label: 'uW/cm²/nm',
      data: new Array(18).fill(0),
      backgroundColor: bgColors,
      borderColor: brdColors,
      borderWidth: 1.5,
      borderRadius: 4,
    }]
  },
  options: {
    responsive: true,
    maintainAspectRatio: false,
    plugins: {
      legend: { display: false },
      tooltip: {
        callbacks: {
          title: items => 'Canal ' + CHANNELS[items[0].dataIndex].id + ' · ' + items[0].label,
          label: item  => ' ' + item.parsed.y.toFixed(4) + ' uW/cm²/nm'
        }
      }
    },
    scales: {
      x: {
        ticks: { color:'#64748b', font:{size:9}, maxRotation:45, autoSkip:false },
        grid:  { color:'rgba(255,255,255,0.04)' },
        title: { display:true, text:'Longitud de onda (nm)', color:'#475569', font:{size:11} }
      },
      y: {
        ticks: { color:'#64748b', font:{size:10}, callback: v => v.toFixed(1) },
        grid:  { color:'rgba(255,255,255,0.07)' },
        title: { display:true, text:'uW/cm²/nm', color:'#475569', font:{size:11} }
      }
    }
  }
});

function switchTab(tab) {
  ['chart','grid','log'].forEach(t => {
    document.getElementById('tab-'+t).classList.toggle('active', t===tab);
    document.getElementById('view-'+t).style.display = (t===tab) ? 'block' : 'none';
  });
}

const SERVICE_UUID = '6e400001-b5a3-f393-e0a9-e50e24dcca9e';
const TX_UUID      = '6e400003-b5a3-f393-e0a9-e50e24dcca9e';
const RX_UUID      = '6e400002-b5a3-f393-e0a9-e50e24dcca9e';

let device, rxChar, buffer='', lastCSV='', measureCount=0, receiving=false;

function log(msg, type='') {
  const el = document.getElementById('log');
  const cls = type ? 'log-'+type : '';
  const time = new Date().toLocaleTimeString();
  el.innerHTML += `<span class="${cls}">[${time}] ${msg}\n</span>`;
  el.scrollTop = el.scrollHeight;
}

function setStatus(text, state) {
  document.getElementById('status-text').textContent = text;
  document.getElementById('dot').className = 'dot'+(state?' '+state:'');
}

async function toggleConnect() {
  if (device && device.gatt.connected) { device.gatt.disconnect(); return; }
  try {
    setStatus('Buscando...','connecting');
    log('Iniciando escaneo BLE...','info');
    device = await navigator.bluetooth.requestDevice({
      filters: [{name:'ESP32-C3 Spectral'}],
      optionalServices: [SERVICE_UUID]
    });
    device.addEventListener('gattserverdisconnected', onDisconnect);
    const server  = await device.gatt.connect();
    const service = await server.getPrimaryService(SERVICE_UUID);
    const txChar  = await service.getCharacteristic(TX_UUID);
    await txChar.startNotifications();
    txChar.addEventListener('characteristicvaluechanged', onData);
    rxChar = await service.getCharacteristic(RX_UUID);
    setStatus('Conectado a '+device.name,'connected');
    log('Conexión establecida ✓','ok');
    document.getElementById('btn-connect').textContent = 'Desconectar';
    document.getElementById('btn-measure').disabled = false;
  } catch(e) {
    setStatus('Desconectado','');
    log('Error: '+e.message,'err');
  }
}

function onDisconnect() {
  setStatus('Desconectado','');
  log('Dispositivo desconectado.','warn');
  document.getElementById('btn-connect').textContent = 'Conectar por BLE';
  document.getElementById('btn-measure').disabled = true;
  buffer=''; receiving=false;
}

function onData(event) {
  buffer += new TextDecoder().decode(event.target.value);
  if (buffer.includes('<<CSV_START>>')) {
    receiving = true;
    buffer = buffer.substring(buffer.indexOf('<<CSV_START>>')+13);
    log('Recibiendo CSV...','info');
  }
  if (receiving && buffer.includes('<<CSV_END>>')) {
    processCSV(buffer.substring(0, buffer.indexOf('<<CSV_END>>')).trim());
    buffer=''; receiving=false;
    return;
  }
  if (!receiving) {
    const validLines = buffer.split('\n').filter(l => /^[A-Z],\d+,/.test(l));
    if (validLines.length >= 18) {
      processCSV('Canal,Lambda_nm,Valor_uW_cm2_nm\n'+validLines.join('\n'));
      buffer='';
    }
  }
}

function processCSV(csvText) {
  lastCSV = csvText;
  measureCount++;
  document.getElementById('stat-count').textContent = measureCount;
  document.getElementById('stats-row').style.display = 'grid';
  log('CSV completo ('+csvText.length+' bytes)','ok');

  const values = new Array(18).fill(0);
  csvText.split('\n').forEach(line => {
    const p = line.split(',');
    if (p.length===3 && /^[A-Z]$/.test(p[0].trim())) {
      const id=p[0].trim(), val=parseFloat(p[2]);
      const idx = CHANNELS.findIndex(c => c.id===id);
      if (idx>=0 && !isNaN(val)) {
        values[idx] = val;
        const el=document.getElementById('val-'+id);
        const card=document.getElementById('card-'+id);
        if(el)   el.textContent = val.toFixed(4);
        if(card) card.classList.add('active');
      }
    }
  });

  spectralChart.data.datasets[0].data = values;
  spectralChart.update();

  const maxVal  = Math.max(...values);
  const peakIdx = values.indexOf(maxVal);
  document.getElementById('stat-peak').textContent = CHANNELS[peakIdx].nm+' nm';
  document.getElementById('stat-max').textContent  = maxVal.toFixed(2);
  document.getElementById('btn-download').disabled = false;
  log('Gráfica actualizada ✓','ok');
}

async function sendCmd(cmd) {
  if (!rxChar) { log('No conectado','err'); return; }
  try {
    await rxChar.writeValueWithoutResponse(new TextEncoder().encode(cmd+'\n'));
    log("Comando: '"+cmd+"'",'info');
  } catch(e) { log('Error: '+e.message,'err'); }
}

function downloadCSV() {
  if (!lastCSV) return;
  const ts   = new Date().toISOString().replace(/[:.]/g,'-').slice(0,19);
  const blob = new Blob([lastCSV],{type:'text/csv'});
  const url  = URL.createObjectURL(blob);
  const a    = document.createElement('a');
  a.href=url; a.download='spectral_'+ts+'.csv'; a.click();
  URL.revokeObjectURL(url);
  log('Descargando spectral_'+ts+'.csv','ok');
}

function clearLog() { document.getElementById('log').innerHTML=''; }

if (!navigator.bluetooth) {
  log('Web Bluetooth no disponible.','err');
  log('Usa Chrome en Android. En iOS prueba "WebBLE" del App Store.','warn');
  document.getElementById('btn-connect').disabled = true;
}
</script>
</body>
</html>
